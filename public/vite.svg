<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Emerald to Amber -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <!-- Shadow filter for premium 3D/glowing look -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer Rounded Square Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" filter="url(#glow)" />
  
  <!-- Subtle inner overlay for glass-like dimension -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="white" fill-opacity="0.08" stroke="white" stroke-width="4" stroke-opacity="0.15" />

  <!-- Letter "i" with modern geometric design (Book & Share lightbulb motif) -->
  <g fill="#ffffff">
    <!-- Dot of the "i" - designed as a glowing lightbulb/sparkle circle -->
    <circle cx="256" cy="156" r="42" />
    
    <!-- Body of the "i" - styled with clean, rounded corners -->
    <rect x="214" y="230" width="84" height="156" rx="20" />
    
    <!-- Stylized decorative "Share" node connected at the bottom -->
    <circle cx="256" cy="386" r="14" fill="#ffffff" fill-opacity="0.9" />
  </g>
</svg>